<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Alessandra Miyake</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #6B2737;
  font-family: 'Jost', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}

/* Ornamentos de fundo */
body::before {
  content: '';
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(200,149,90,0.08);
  top: -150px; right: -150px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  width: 350px; height: 350px;
  border-radius: 50%;
  border: 1px solid rgba(200,149,90,0.06);
  bottom: -100px; left: -80px;
  pointer-events: none;
}

/* CARD CENTRAL */
.card {
  width: 100%;
  max-width: 480px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,149,90,0.2);
  border-radius: 2px;
  padding: 44px 40px 40px;
  position: relative;
  backdrop-filter: blur(10px);
}

/* Canto decorativo */
.card::before {
  content: '';
  position: absolute;
  top: 12px; left: 12px; right: 12px; bottom: 12px;
  border: 1px solid rgba(200,149,90,0.08);
  border-radius: 2px;
  pointer-events: none;
}

/* Logo */
.logo-wrap {
  text-align: center;
  margin-bottom: 6px;
}
.logo-wrap img {
  width: 160px;
  height: auto;
  filter: brightness(0) invert(1);
  opacity: 0.88;
}

/* Linha gold */
.gold-line {
  width: 160px; height: 1px;
  background: linear-gradient(to right, transparent, #C8955A, transparent);
  margin: 12px auto 16px;
}
.gold-line.short {
  width: 80px;
  margin: 16px auto 28px;
}

/* Nome e cargo */
.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 300;
  color: #fff;
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.role {
  font-size: 9px; letter-spacing: 5px;
  text-transform: uppercase;
  color: #C8955A;
  text-align: center;
  margin-bottom: 4px;
}
.spec {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  letter-spacing: 0.5px;
  line-height: 1.8;
}

/* GRID DE ÍCONES */
.icons-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}

/* Divisor */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 12px;
}
.div-line {
  flex: 1; height: 1px;
  background: rgba(200,149,90,0.2);
}
.div-text {
  font-size: 8px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(200,149,90,0.5);
  white-space: nowrap;
}

/* Ícone individual */
.icon-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px 8px 16px;
  text-decoration: none;
  border: 1px solid rgba(200,149,90,0.15);
  border-radius: 2px;
  background: rgba(255,255,255,0.03);
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.icon-link:hover {
  background: rgba(200,149,90,0.08);
  border-color: rgba(200,149,90,0.35);
  transform: translateY(-3px);
}
.icon-link:active { transform: translateY(0); }

/* Barra inferior colorida */
.icon-link::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .2s;
}
.icon-link:hover::after { opacity: 1; }

.icon-link.wpp::after    { background: #25D366; }
.icon-link.cal::after    { background: #C8955A; }
.icon-link.tik::after    { background: #fff; }
.icon-link.ins::after    { background: #E1306C; }
.icon-link.tel::after    { background: #C8955A; }

/* SVG ícone */
.icon-svg {
  width: 36px; height: 36px;
  opacity: 0.75;
  transition: opacity .2s;
}
.icon-link:hover .icon-svg { opacity: 1; }

.icon-label {
  font-size: 8px; letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  text-align: center;
  transition: color .2s;
  line-height: 1.4;
}
.icon-link:hover .icon-label { color: #C8955A; }

/* PORTAL — botão largo */
.portal-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  border: 1px solid rgba(200,149,90,0.3);
  border-radius: 2px;
  text-decoration: none;
  background: rgba(200,149,90,0.07);
  transition: all .2s;
  margin-top: 8px;
}
.portal-btn:hover {
  background: rgba(200,149,90,0.14);
  border-color: rgba(200,149,90,0.5);
}
.portal-left {
  display: flex; align-items: center; gap: 14px;
}
.portal-icon {
  font-size: 16px; opacity: 0.8;
}
.portal-text {}
.portal-label {
  font-size: 8px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(200,149,90,0.6);
  display: block; margin-bottom: 2px;
}
.portal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  color: rgba(255,255,255,0.85);
}
.portal-arrow {
  font-size: 18px;
  color: rgba(200,149,90,0.5);
}

/* OAB rodapé */
.oab {
  text-align: center;
  margin-top: 24px;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(200,149,90,0.35);
  text-transform: uppercase;
}

/* Animação entrada */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
.card { animation: fadeUp .5s ease; }
.icon-link:nth-child(1) { animation: fadeUp .4s .1s ease both; }
.icon-link:nth-child(2) { animation: fadeUp .4s .18s ease both; }
.icon-link:nth-child(3) { animation: fadeUp .4s .26s ease both; }
.icon-link:nth-child(4) { animation: fadeUp .4s .34s ease both; }
</style>
</head>
